<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tickets - CricPulse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar"><div class="nav-top"><a href="index.html" class="nav-logo"><div class="logo-icon"><i class="fas fa-cricket-bat-ball"></i></div>Cric<span>Pulse</span></a></div></nav>
<main>
<section style="background:var(--primary); padding:40px 0; color:#fff;">
  <div class="container text-center">
    <h1 style="font-size:32px; font-weight:900;"><i class="fas fa-ticket-alt" style="color:var(--accent);"></i> Book Match Tickets</h1>
    <p style="opacity:0.7;">Official ticketing partner for global series.</p>
  </div>
</section>
<div class="container" style="padding-top:24px;">
  <div class="card card-body" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
    <div>
      <div style="font-size:14px; font-weight:800; color:var(--primary); margin-bottom:4px;">T20I Series • Wankhede Stadium, Mumbai</div>
      <div style="font-size:20px; font-weight:900;">IND vs ENG</div>
      <div style="font-size:14px; color:var(--text-muted); margin-top:4px;">Sun, 12 May 2026 • 7:00 PM IST</div>
    </div>
    <div style="text-align:right;">
      <div style="font-weight:900; font-size:24px; color:var(--accent);">₹1,200</div>
      <div style="font-size:12px; color:var(--danger); font-weight:bold; margin-bottom:8px;">Fast Filling!</div>
      <button class="btn btn-primary">Book Now</button>
    </div>
  </div>
</div>
</main>
</body>
</html>
