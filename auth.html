<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - CricPulse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/styles.css">
<style>
.auth-container { max-width: 400px; margin: 60px auto; background: var(--card); padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow); }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
.form-control { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); }
.form-control:focus { border-color: var(--primary); outline: none; }
.social-btn { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--text); font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; transition: 0.2s; }
.social-btn:hover { background: var(--bg); }
</style>
</head>
<body>
<nav class="navbar"><div class="nav-top"><a href="index.html" class="nav-logo"><div class="logo-icon"><i class="fas fa-cricket-bat-ball"></i></div>Cric<span>Pulse</span></a></div></nav>
<main>
<div class="container">
  <div class="auth-container">
    <h1 style="font-size:24px; font-weight:800; text-align:center; margin-bottom:8px;">Welcome Back</h1>
    <p style="text-align:center; color:var(--text-muted); font-size:14px; margin-bottom:32px;">Login to access personalized stats and fantasy.</p>
    
    <button class="social-btn"><img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18" alt="Google"> Continue with Google</button>
    <div style="text-align:center; margin: 20px 0; color:var(--text-muted); font-size:12px; text-transform:uppercase;">Or</div>
    
    <form onsubmit="event.preventDefault(); window.location.href='index.html';">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="fan@cricpulse.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Login</button>
    </form>
  </div>
</div>
</main>
</body>
</html>
