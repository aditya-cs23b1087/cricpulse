<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Profile - CricPulse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar"><div class="nav-top"><a href="index.html" class="nav-logo"><div class="logo-icon"><i class="fas fa-cricket-bat-ball"></i></div>Cric<span>Pulse</span></a></div></nav>
<main>
<section style="background:linear-gradient(135deg, #0A1628, #1C3454); padding:60px 0; color:#fff;">
  <div class="container" style="display:flex; align-items:center; gap:24px;">
    <div style="width:100px; height:100px; background:#00529B; border-radius:50%; display:flex; align-items:center; justify-content:center; border:4px solid #fff;">
      <span style="font-weight:900; font-size:32px; color:#FF9933;">IND</span>
    </div>
    <div>
      <h1 style="font-size:36px; font-weight:900;">India Men's National Cricket Team</h1>
      <p style="opacity:0.8; font-size:16px;">Rank: #1 (TEST) | #1 (ODI) | #1 (T20I)</p>
    </div>
  </div>
</section>
<div class="container" style="padding-top:24px;">
  <div class="tabs">
    <button class="tab active">Overview</button><button class="tab">Squad</button><button class="tab">Fixtures</button>
  </div>
  <div style="display:grid; grid-template-columns:2fr 1fr; gap:24px; margin-top:24px;">
    <div class="card card-body">
      <h2 style="font-size:18px; font-weight:800; margin-bottom:16px;">Recent Form</h2>
      <div style="display:flex; gap:8px;">
        <span style="background:var(--success); color:#fff; padding:4px 12px; border-radius:4px; font-weight:bold;">W</span>
        <span style="background:var(--success); color:#fff; padding:4px 12px; border-radius:4px; font-weight:bold;">W</span>
        <span style="background:var(--danger); color:#fff; padding:4px 12px; border-radius:4px; font-weight:bold;">L</span>
        <span style="background:var(--success); color:#fff; padding:4px 12px; border-radius:4px; font-weight:bold;">W</span>
        <span style="background:var(--success); color:#fff; padding:4px 12px; border-radius:4px; font-weight:bold;">W</span>
      </div>
    </div>
    <div class="card card-body">
      <h2 style="font-size:18px; font-weight:800; margin-bottom:16px;">Trophies</h2>
      <ul style="list-style:none; padding:0; margin:0; line-height:2;">
        <li>🏆 ICC World Cup: 2 (1983, 2011)</li>
        <li>🏆 T20 World Cup: 1 (2007)</li>
        <li>🏆 Champions Trophy: 2 (2002, 2013)</li>
      </ul>
    </div>
  </div>
</div>
</main>
</body>
</html>
