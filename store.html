<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Store - CricPulse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar"><div class="nav-top"><a href="index.html" class="nav-logo"><div class="logo-icon"><i class="fas fa-cricket-bat-ball"></i></div>Cric<span>Pulse</span></a></div></nav>
<main>
<section style="background:var(--primary); padding:40px 0; color:#fff;">
  <div class="container text-center">
    <h1 style="font-size:32px; font-weight:900;"><i class="fas fa-shopping-cart" style="color:var(--accent);"></i> Fan Merchandise</h1>
    <p style="opacity:0.7;">Get your official team jerseys and gear.</p>
  </div>
</section>
<div class="container" style="padding-top:24px; display:grid; grid-template-columns:repeat(4, 1fr); gap:24px;">
  <!-- Item 1 -->
  <div class="card card-body text-center" style="padding:24px;">
    <div style="width:100%; height:150px; background:#f0f0f0; border-radius:8px; margin-bottom:16px; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-weight:bold;">[Image: IND Jersey]</div>
    <h3 style="font-size:16px; font-weight:800; margin-bottom:8px;">Official India ODI Jersey</h3>
    <div style="font-size:18px; font-weight:900; color:var(--primary); margin-bottom:16px;">₹2,999</div>
    <button class="btn btn-outline" style="width:100%; justify-content:center;">Add to Cart</button>
  </div>
  <!-- Item 2 -->
  <div class="card card-body text-center" style="padding:24px;">
    <div style="width:100%; height:150px; background:#f0f0f0; border-radius:8px; margin-bottom:16px; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-weight:bold;">[Image: Cap]</div>
    <h3 style="font-size:16px; font-weight:800; margin-bottom:8px;">Team India Training Cap</h3>
    <div style="font-size:18px; font-weight:900; color:var(--primary); margin-bottom:16px;">₹899</div>
    <button class="btn btn-outline" style="width:100%; justify-content:center;">Add to Cart</button>
  </div>
</div>
</main>
</body>
</html>
