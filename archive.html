<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Archives - CricPulse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar"><div class="nav-top"><a href="index.html" class="nav-logo"><div class="logo-icon"><i class="fas fa-cricket-bat-ball"></i></div>Cric<span>Pulse</span></a></div></nav>
<main>
<div class="container" style="padding-top:40px;">
  <h1 style="font-size:28px; font-weight:900; margin-bottom:24px;"><i class="fas fa-history" style="color:var(--primary); margin-right:8px;"></i>Match Archives</h1>
  
  <div style="display:flex; gap:16px; margin-bottom:24px;">
    <select class="form-control" style="width:200px;"><option>Year: 2024</option><option>2023</option></select>
    <select class="form-control" style="width:200px;"><option>Format: All</option><option>TEST</option></select>
  </div>

  <div class="card card-body" style="margin-bottom:16px; display:flex; justify-content:space-between; align-items:center;">
    <div>
      <div style="font-size:12px; color:var(--text-muted); font-weight:bold; margin-bottom:8px;">ICC Men's ODI World Cup Final • Nov 19, 2023</div>
      <div style="display:flex; gap:16px; align-items:center;">
        <div style="font-weight:700; font-size:18px;">IND 240/10</div>
        <div style="color:var(--text-muted);">vs</div>
        <div style="font-weight:700; font-size:18px;">AUS 241/4</div>
      </div>
      <div style="color:var(--danger); font-weight:600; margin-top:8px; font-size:14px;">Australia won by 6 wickets</div>
    </div>
    <button class="btn btn-outline">View Scorecard</button>
  </div>
</div>
</main>
</body>
</html>
